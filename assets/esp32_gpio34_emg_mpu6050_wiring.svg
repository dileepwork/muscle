<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .title { font: 700 42px Arial, sans-serif; fill: #0f172a; letter-spacing: 2px; }
      .section { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 20px Arial, sans-serif; fill: #0f172a; }
      .small { font: 16px Arial, sans-serif; fill: #334155; }
      .pin { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .note { font: 700 18px Arial, sans-serif; fill: #b91c1c; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 16; }
      .module { fill: #e2e8f0; stroke: #0f172a; stroke-width: 3; rx: 12; }
      .pinbox { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 7; }
      .power { stroke: #dc2626; stroke-width: 6; fill: none; }
      .ground { stroke: #111827; stroke-width: 6; fill: none; }
      .signal { stroke: #16a34a; stroke-width: 6; fill: none; }
      .i2c-sda { stroke: #2563eb; stroke-width: 6; fill: none; }
      .i2c-scl { stroke: #7c3aed; stroke-width: 6; fill: none; }
      .dot-red { fill: #dc2626; }
      .dot-black { fill: #111827; }
      .dot-green { fill: #16a34a; }
      .dot-blue { fill: #2563eb; }
      .dot-purple { fill: #7c3aed; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#ffffff"/>
  <text x="800" y="60" text-anchor="middle" class="title">ESP32 + EMG SENSOR + MPU6050 WIRING</text>

  <!-- ESP32 -->
  <rect x="70" y="125" width="360" height="720" class="box"/>
  <text x="250" y="170" text-anchor="middle" class="section">ESP32 DEV MODULE</text>
  <rect x="165" y="225" width="170" height="250" class="module"/>
  <text x="250" y="350" text-anchor="middle" class="label">ESP32</text>
  <text x="250" y="380" text-anchor="middle" class="small">Dev Module</text>

  <rect x="340" y="205" width="120" height="38" class="pinbox"/>
  <text x="400" y="230" text-anchor="middle" class="pin">3V3</text>
  <rect x="340" y="265" width="120" height="38" class="pinbox"/>
  <text x="400" y="290" text-anchor="middle" class="pin">GND</text>
  <rect x="340" y="335" width="120" height="38" class="pinbox"/>
  <text x="400" y="360" text-anchor="middle" class="pin">GPIO34</text>
  <rect x="340" y="430" width="120" height="38" class="pinbox"/>
  <text x="400" y="455" text-anchor="middle" class="pin">GPIO21</text>
  <rect x="340" y="490" width="120" height="38" class="pinbox"/>
  <text x="400" y="515" text-anchor="middle" class="pin">GPIO22</text>

  <text x="120" y="710" class="small">GPIO34 is analog input only.</text>
  <text x="120" y="738" class="small">It has no internal pull-down.</text>
  <text x="120" y="766" class="small">Use external 100k resistor to GND.</text>

  <!-- EMG module -->
  <rect x="1130" y="130" width="360" height="270" class="box"/>
  <text x="1310" y="175" text-anchor="middle" class="section">EMG SENSOR</text>
  <rect x="1185" y="220" width="250" height="120" class="module"/>
  <text x="1310" y="282" text-anchor="middle" class="label">EMG MODULE</text>
  <rect x="1070" y="205" width="100" height="36" class="pinbox"/>
  <text x="1120" y="229" text-anchor="middle" class="pin">VCC</text>
  <rect x="1070" y="275" width="100" height="36" class="pinbox"/>
  <text x="1120" y="299" text-anchor="middle" class="pin">GND</text>
  <rect x="1070" y="345" width="100" height="36" class="pinbox"/>
  <text x="1120" y="369" text-anchor="middle" class="pin">OUT</text>

  <!-- MPU6050 module -->
  <rect x="1130" y="520" width="360" height="330" class="box"/>
  <text x="1310" y="565" text-anchor="middle" class="section">MPU6050 / GY-521</text>
  <rect x="1190" y="625" width="240" height="140" class="module"/>
  <text x="1310" y="695" text-anchor="middle" class="label">MPU6050</text>
  <text x="1310" y="725" text-anchor="middle" class="small">I2C IMU</text>
  <rect x="1070" y="595" width="100" height="36" class="pinbox"/>
  <text x="1120" y="619" text-anchor="middle" class="pin">VCC</text>
  <rect x="1070" y="645" width="100" height="36" class="pinbox"/>
  <text x="1120" y="669" text-anchor="middle" class="pin">GND</text>
  <rect x="1070" y="695" width="100" height="36" class="pinbox"/>
  <text x="1120" y="719" text-anchor="middle" class="pin">SDA</text>
  <rect x="1070" y="745" width="100" height="36" class="pinbox"/>
  <text x="1120" y="769" text-anchor="middle" class="pin">SCL</text>

  <!-- Wires -->
  <path d="M460 224 H900 V223 H1070" class="power"/>
  <circle cx="460" cy="224" r="9" class="dot-red"/>
  <circle cx="1070" cy="223" r="9" class="dot-red"/>
  <path d="M900 224 V613 H1070" class="power"/>
  <circle cx="1070" cy="613" r="9" class="dot-red"/>

  <path d="M460 284 H860 V293 H1070" class="ground"/>
  <circle cx="460" cy="284" r="9" class="dot-black"/>
  <circle cx="1070" cy="293" r="9" class="dot-black"/>
  <path d="M860 284 V663 H1070" class="ground"/>
  <circle cx="1070" cy="663" r="9" class="dot-black"/>

  <path d="M460 354 H700 V363 H1070" class="signal"/>
  <circle cx="460" cy="354" r="9" class="dot-green"/>
  <circle cx="1070" cy="363" r="9" class="dot-green"/>

  <path d="M460 449 H770 V713 H1070" class="i2c-sda"/>
  <circle cx="460" cy="449" r="9" class="dot-blue"/>
  <circle cx="1070" cy="713" r="9" class="dot-blue"/>

  <path d="M460 509 H810 V763 H1070" class="i2c-scl"/>
  <circle cx="460" cy="509" r="9" class="dot-purple"/>
  <circle cx="1070" cy="763" r="9" class="dot-purple"/>

  <!-- Pull-down resistor -->
  <path d="M700 354 V530" class="signal"/>
  <rect x="678" y="420" width="44" height="90" fill="#fef3c7" stroke="#92400e" stroke-width="3" rx="8"/>
  <path d="M700 530 V600 H860" class="ground"/>
  <text x="735" y="455" class="label">100k</text>
  <text x="735" y="483" class="small">pull-down</text>
  <text x="735" y="510" class="small">GPIO34 to GND</text>

  <!-- Legend -->
  <rect x="80" y="875" width="550" height="80" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="12"/>
  <line x1="110" y1="905" x2="170" y2="905" class="power"/>
  <text x="185" y="912" class="small">3V3 power</text>
  <line x1="310" y1="905" x2="370" y2="905" class="ground"/>
  <text x="385" y="912" class="small">GND</text>
  <line x1="480" y1="905" x2="540" y2="905" class="signal"/>
  <text x="555" y="912" class="small">EMG analog OUT</text>
  <line x1="110" y1="935" x2="170" y2="935" class="i2c-sda"/>
  <text x="185" y="942" class="small">SDA to GPIO21</text>
  <line x1="310" y1="935" x2="370" y2="935" class="i2c-scl"/>
  <text x="385" y="942" class="small">SCL to GPIO22</text>

  <!-- Notes -->
  <rect x="690" y="865" width="820" height="105" fill="#fff7ed" stroke="#f97316" stroke-width="3" rx="16"/>
  <text x="720" y="902" class="note">Warnings:</text>
  <text x="720" y="930" class="small">GPIO34 max input is 3.3V. Do not feed 5V directly into GPIO34.</text>
  <text x="720" y="956" class="small">MPU6050 uses I2C: SDA to GPIO21, SCL to GPIO22. Current firmware needs MPU6050 code before pitch/roll become real.</text>
</svg>
